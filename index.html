<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oficina MW Microware</title>
  <link rel="icon" type="image/png" href="https://www.mwmicroware.com.br/wp-content/uploads/2018/05/cropped-mw_logo_full3.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg:#f3f4f6;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --primary:#000000;
      --primary-dark:#2b2b2b;
      --border:#e5e7eb;
      --soft:#f9fafb;
      --success-bg:#dcfce7;
      --success-text:#166534;
      --warning-bg:#fef3c7;
      --warning-text:#92400e;
      --info-bg:#dbeafe;
      --info-text:#1d4ed8;
      --danger-bg:#fee2e2;
      --danger-text:#991b1b;
      --shadow:0 8px 24px rgba(0,0,0,.08);
    }

    body.dark {
      --bg:#0b1220;
      --card:#111827;
      --text:#f3f4f6;
      --muted:#9ca3af;
      --primary:#f3f4f6;
      --primary-dark:#d1d5db;
      --border:#243042;
      --soft:#0f172a;
      --success-bg:#052e16;
      --success-text:#86efac;
      --warning-bg:#3f2a05;
      --warning-text:#fcd34d;
      --info-bg:#172554;
      --info-text:#93c5fd;
      --danger-bg:#450a0a;
      --danger-text:#fca5a5;
      --shadow:0 8px 28px rgba(0,0,0,.35);
    }

    * { box-sizing:border-box; }
    body {
      margin:0;
      font-family:Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
      transition:.2s;
    }

    .container {
      max-width:1200px;
      margin:0 auto;
      padding:16px;
    }

    .card {
      background:var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      padding:16px;
      box-shadow:var(--shadow);
      margin-bottom:16px;
    }

    h1,h2,h3,h4,p { margin:0 0 10px; }
    .muted { color:var(--muted); font-size:14px; }
    .small { font-size:12px; }

    .grid-2, .grid-3, .grid-4 {
      display:grid;
      gap:12px;
    }

    .grid-2 { grid-template-columns:1fr; }
    .grid-3 { grid-template-columns:1fr; }
    .grid-4 { grid-template-columns:1fr; }

    @media (min-width: 760px) {
      .grid-2 { grid-template-columns:1fr 1fr; }
      .grid-3 { grid-template-columns:repeat(3, 1fr); }
      .grid-4 { grid-template-columns:repeat(4, 1fr); }
    }

    label {
      display:block;
      margin-bottom:6px;
      font-size:14px;
      font-weight:700;
    }

    input, select, textarea, button {
      width:100%;
      padding:11px 12px;
      border:1px solid var(--border);
      border-radius:12px;
      font-size:15px;
      background:var(--card);
      color:var(--text);
    }

    textarea {
      min-height:100px;
      resize:vertical;
    }

    button {
      background:var(--primary);
      color:var(--bg);
      border:none;
      font-weight:700;
      cursor:pointer;
      transition:.15s;
    }

    button:hover {
      background:var(--primary-dark);
    }

    button.ghost {
      background:var(--soft);
      color:var(--text);
      border:1px solid var(--border);
    }

    button.ghost:hover {
      filter:brightness(.98);
    }

    .row {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .row > * {
      flex:1;
      min-width:160px;
    }

    .hidden { display:none !important; }

    .logo {
      max-width:260px;
      height:auto;
      margin-bottom:6px;
    }

    .topbar {
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }

    .topbar-actions {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .tag, .badge {
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      border:1px solid transparent;
    }

    .tag {
      background:var(--soft);
      color:var(--text);
      border-color:var(--border);
    }

    .badge.success { background:var(--success-bg); color:var(--success-text); }
    .badge.warning { background:var(--warning-bg); color:var(--warning-text); }
    .badge.info { background:var(--info-bg); color:var(--info-text); }
    .badge.danger { background:var(--danger-bg); color:var(--danger-text); }

    .metric {
      background:linear-gradient(180deg, var(--card), var(--soft));
      border:1px solid var(--border);
      border-radius:16px;
      padding:14px;
    }

    .metric .label {
      font-size:13px;
      color:var(--muted);
      margin-bottom:6px;
    }

    .metric .value {
      font-size:28px;
      font-weight:800;
    }

    .metric .sub {
      font-size:12px;
      color:var(--muted);
      margin-top:6px;
    }

    .checkbox-group {
      display:flex;
      gap:18px;
      flex-wrap:wrap;
      margin-top:8px;
    }

    .checkbox-group label {
      display:flex;
      align-items:center;
      gap:8px;
      font-weight:400;
      margin:0;
      background:var(--soft);
      border:1px solid var(--border);
      border-radius:12px;
      padding:10px 12px;
    }

    .checkbox-group input {
      width:auto;
      margin:0;
    }

    .checklist {
      display:grid;
      gap:10px;
      margin-top:8px;
    }

    .check-item {
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--border);
      background:var(--soft);
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
      font-size:14px;
    }

    .cards-results {
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
      margin-top:12px;
    }

    @media (min-width: 900px) {
      .cards-results { grid-template-columns:repeat(2, 1fr); }
    }

    .result-card {
      border:1px solid var(--border);
      border-radius:16px;
      padding:14px;
      background:var(--card);
    }

    .result-card h4 {
      margin-bottom:8px;
    }

    .result-card .meta {
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-bottom:10px;
    }

    .result-card .actions {
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .table-wrap {
      overflow:auto;
    }

    table {
      width:100%;
      border-collapse:collapse;
      font-size:14px;
    }

    th, td {
      border-bottom:1px solid var(--border);
      padding:10px 8px;
      text-align:left;
      vertical-align:top;
      white-space:nowrap;
    }

    tr:nth-child(even) td {
      background:rgba(127,127,127,.03);
    }

    .toast-wrap {
      position:fixed;
      top:16px;
      right:16px;
      z-index:9999;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .toast {
      min-width:280px;
      max-width:360px;
      padding:14px 16px;
      border-radius:14px;
      color:#fff;
      box-shadow:var(--shadow);
      animation:fadeIn .2s ease;
      font-size:14px;
      font-weight:700;
    }

    .toast.success { background:#166534; }
    .toast.error { background:#991b1b; }
    .toast.info { background:#1d4ed8; }

    @keyframes fadeIn {
      from { opacity:0; transform:translateY(-8px); }
      to { opacity:1; transform:translateY(0); }
    }

    .modal-backdrop {
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.55);
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:9998;
      padding:16px;
    }

    .modal {
      width:min(900px, 100%);
      max-height:90vh;
      overflow:auto;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:20px;
      padding:18px;
      box-shadow:var(--shadow);
    }

    .modal-header {
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:14px;
    }

    .section-title {
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
      flex-wrap:wrap;
    }

    .empty {
      border:1px dashed var(--border);
      border-radius:14px;
      padding:16px;
      color:var(--muted);
      text-align:center;
      background:var(--soft);
    }
  </style>
</head>
<body>
  <div class="toast-wrap" id="toastWrap"></div>

  <div id="detailsModalBackdrop" class="modal-backdrop hidden">
    <div class="modal">
      <div class="modal-header">
        <div>
          <h3>Detalhes do chamado</h3>
          <p class="muted">Visualização completa do registro.</p>
        </div>
        <button class="ghost" id="btnCloseDetails" style="width:auto;">Fechar</button>
      </div>
      <div id="detailsContent"></div>
    </div>
  </div>

  <div class="container">
    <div id="authView" class="card">
        <img
          class="logo"
          src="https://www.mwmicroware.com.br/wp-content/uploads/2018/05/cropped-mw_logo_full3.png"
          alt="MW Microware"
        />
      </center>

      <div class="row" style="margin-bottom:12px;">
        <button id="btnTabLogin">Login</button>
        <button id="btnTabRegister" class="ghost">Registrar</button>
      </div>

      <div id="loginBox">
        <div class="grid-2">
          <div>
            <label>Email</label>
            <input id="loginEmail" type="email" placeholder="tecnico@mwmicroware.com" />
          </div>
          <div>
            <label>Senha</label>
            <input id="loginSenha" type="password" placeholder="******" />
          </div>
        </div>
        <button id="btnLogin" style="margin-top:12px;">Entrar</button>
      </div>

      <div id="registerBox" class="hidden">
        <div class="grid-2">
          <div>
            <label>Nome do técnico</label>
            <input id="regNome" placeholder="Técnico" />
          </div>
          <div>
            <label>Email</label>
            <input id="regEmail" type="email" placeholder="tecnico@mwmicroware.com.br" />
          </div>
          <div>
            <label>Senha</label>
            <input id="regSenha" type="password" placeholder="******" />
          </div>
          <div>
            <label>Confirmar senha</label>
            <input id="regSenha2" type="password" placeholder="******" />
          </div>
        </div>
        <button id="btnRegister" style="margin-top:12px;">Criar conta</button>
      </div>

      <p id="authMsg" class="small muted" style="margin-top:10px;"></p>
    </div>

    <div id="appView" class="hidden">
      <div class="topbar">
        <div class="topbar-actions">
          <span id="userInfo" class="tag"></span>
          <button class="ghost" id="btnToggleTheme" style="width:auto;">Tema escuro</button>
          <button id="btnLogout" class="ghost" style="width:auto;">Sair</button>
        </div>
      </div>

      <div class="card">
        <div class="section-title">
          <div>
            <h3>Dashboard</h3>
            <p class="muted">Visão geral do mês e recorrência de máquinas/localidades.</p>
          </div>
          <div class="row" style="min-width:280px;">
            <input id="dashboardMonth" type="text" placeholder="AAAA-MM (ex.: 2026-03)" />
            <button id="btnRefreshDashboard">Atualizar dashboard</button>
          </div>
        </div>

        <div class="grid-4" id="dashboardCards"></div>

        <div class="grid-2" style="margin-top:12px;">
          <div class="card" style="margin-bottom:0;">
            <h4>Patrimônios com mais chamados</h4>
            <div class="table-wrap" id="dashboardPatrimonio"></div>
          </div>
          <div class="card" style="margin-bottom:0;">
            <h4>Chamados por localidade</h4>
            <div class="table-wrap" id="dashboardLocalidade"></div>
          </div>
        </div>
      </div>

      <div class="card">
        <h3 id="formTitle">Novo chamado</h3>
        <div class="grid-2">
          <div>
            <label>Número do chamado</label>
            <input id="numeroChamado" placeholder="CH-1025" />
          </div>

          <div>
            <label>Patrimônio</label>
            <input id="patrimonio" placeholder="PAT-8841" />
          </div>

          <div>
            <label>Marca do computador</label>
            <select id="marcaComputador"></select>
          </div>

          <div>
            <label>Tipo de instalação</label>
            <select id="tipoInstalacao"></select>
          </div>

          <div>
            <label>Office ativado?</label>
            <select id="officeAtivado">
              <option value="">Selecione</option>
              <option value="Sim">Sim</option>
              <option value="Não">Não</option>
            </select>
          </div>

          <div>
            <label>IP</label>
            <input id="ip" placeholder="192.168.0.25" />
          </div>

          <div>
            <label>Localidade</label>
            <select id="localidade"></select>
          </div>

          <div id="proxyWrap" class="hidden">
            <label>Retirou o proxy do Inicializar?</label>
            <select id="proxyInicializar">
              <option value="">Selecione</option>
              <option value="Sim">Sim</option>
              <option value="Não">Não</option>
            </select>
          </div>

          <div id="setorPAWrap" class="hidden">
            <label>Setor do PA</label>
            <select id="setorPA"></select>
          </div>

          <div id="financeiroSoftwaresWrap" class="hidden" style="grid-column:1/-1;">
            <label>Marque os softwares que você instalou para o setor financeiro</label>
            <div class="checkbox-group">
              <label><input type="checkbox" class="financeiroSoftware" value="Quick"> Quick</label>
              <label><input type="checkbox" class="financeiroSoftware" value="Banco do Brasil"> Banco do Brasil</label>
              <label><input type="checkbox" class="financeiroSoftware" value="Sales"> Sales</label>
            </div>
          </div>

          <div>
            <label>Memória RAM</label>
            <select id="memoriaRam"></select>
          </div>

          <div id="ramOutroWrap" class="hidden">
            <label>Outro valor de RAM</label>
            <input id="memoriaRamOutro" placeholder="Ex.: 12 GB" />
          </div>

          <div>
            <label>Armazenamento</label>
            <select id="armazenamentoTipo"></select>
          </div>

          <div id="outroStorageWrap" class="hidden">
            <label>Marca/modelo do SSD</label>
            <input id="armazenamentoOutros" placeholder="Ex.: WD Green 240 GB" />
          </div>

          <div style="grid-column:1/-1;">
            <label>Problema</label>
            <textarea id="problema" placeholder="Descreva o problema"></textarea>
          </div>

          <div style="grid-column:1/-1;">
            <label>Resolução</label>
            <textarea id="resolucao" placeholder="Descreva a resolução"></textarea>
          </div>

          <div style="grid-column:1/-1;">
            <label>Checklist visual</label>
            <div class="checklist" id="checklistBox"></div>
          </div>
        </div>

        <div class="row" style="margin-top:12px;">
          <button id="btnSalvar">Salvar chamado</button>
          <button id="btnCancelarEdicao" class="ghost hidden">Cancelar edição</button>
        </div>

        <p id="formMsg" class="small muted" style="margin-top:10px;"></p>
      </div>

      <div class="card">
        <h3>Consulta</h3>
        <div class="grid-3">
          <div>
            <label>Patrimônio</label>
            <input id="buscaPatrimonio" placeholder="Digite o patrimônio" />
          </div>
          <div>
            <label>Localidade</label>
            <select id="filtroLocalidade"></select>
          </div>
          <div>
            <label>Técnico</label>
            <input id="filtroTecnico" placeholder="Nome do técnico" />
          </div>
          <div>
            <label>Marca</label>
            <select id="filtroMarca"></select>
          </div>
          <div>
            <label>Tipo de instalação</label>
            <select id="filtroInstalacao"></select>
          </div>
          <div>
            <label>Mês</label>
            <input id="filtroMes" type="text" placeholder="AAAA-MM (opcional)" />
          </div>
        </div>

        <div class="row" style="margin-top:12px;">
          <button id="btnBuscar">Buscar</button>
          <button id="btnLimparFiltros" class="ghost">Limpar filtros</button>
        </div>

        <div class="cards-results" id="resultadoCards"></div>

        <div style="overflow:auto; margin-top:14px;">
          <div id="resultadoChamados"></div>
        </div>

        <div style="overflow:auto; margin-top:14px;">
          <div id="resultadoHistorico"></div>
        </div>
      </div>

      <div class="card">
        <h3>Exportar relatório mensal</h3>
        <div class="row">
          <input id="mesRef" type="text" placeholder="AAAA-MM (ex.: 2026-03)" />
          <button id="btnExportar">Exportar CSV para Excel</button>
        </div>
        <p class="muted small">A exportação inclui todos os campos do chamado.</p>
      </div>
    </div>
  </div>

  <script src="./supabase-config.js"></script>
  <script>
    const RAM_OPTIONS = ["4 GB", "8 GB", "16 GB", "32 GB", "64 GB", "Outro"];
    const STORAGE_OPTIONS = ["SSD Keepdata", "SSD Ceamere", "SSD Kingston", "SSD Outros", "HDD Notebook", "HDD Computador"];
    const LOCALIDADE_OPTIONS = ["PAMB", "Mandaqui", "Castelo", "Coleta Externa", "Centro Cirúrgico", "PA"];
    const MARCA_OPTIONS = ["Lenovo ThinkCentre", "Lenovo ThinkCentre SFF", "Digital", "All in One", "Positivo"];
    const INSTALACAO_OPTIONS = ["Instalação limpa", "Clone"];
    const SETOR_PA_OPTIONS = ["Financeiro", "Ouvidoria", "RH"];

    const APP = {
      sessionUser: null,
      profile: null,
      editingId: null,
      lastCalls: [],
      supabase: null,
      currentFilteredCalls: [],
      allCallsForDashboard: []
    };

    const $ = (id) => document.getElementById(id);

    function showToast(message, type = "info") {
      const wrap = $("toastWrap");
      const div = document.createElement("div");
      div.className = `toast ${type}`;
      div.textContent = message;
      wrap.appendChild(div);
      setTimeout(() => div.remove(), 3200);
    }

    function fillSelect(selectId, options, placeholder = "Todos") {
      const el = $(selectId);
      el.innerHTML = "";
      const first = document.createElement("option");
      first.value = "";
      first.textContent = placeholder;
      el.appendChild(first);

      options.forEach(item => {
        const option = document.createElement("option");
        option.value = item;
        option.textContent = item;
        el.appendChild(option);
      });
    }

    fillSelect("memoriaRam", RAM_OPTIONS, "Selecione");
    fillSelect("armazenamentoTipo", STORAGE_OPTIONS, "Selecione");
    fillSelect("localidade", LOCALIDADE_OPTIONS, "Selecione");
    fillSelect("marcaComputador", MARCA_OPTIONS, "Selecione");
    fillSelect("tipoInstalacao", INSTALACAO_OPTIONS, "Selecione");
    fillSelect("setorPA", SETOR_PA_OPTIONS, "Selecione");

    fillSelect("filtroLocalidade", LOCALIDADE_OPTIONS, "Todas");
    fillSelect("filtroMarca", MARCA_OPTIONS, "Todas");
    fillSelect("filtroInstalacao", INSTALACAO_OPTIONS, "Todos");

    const authMsg = $("authMsg");
    const formMsg = $("formMsg");

    function setMsg(el, msg, type = "muted") {
      el.className = "small " + type;
      el.textContent = msg;
    }

    function formatMonthInput(date = new Date()) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}`;
    }

    $("dashboardMonth").value = formatMonthInput();
    $("mesRef").value = formatMonthInput();

    function badge(text, type = "info") {
      return `<span class="badge ${type}">${text}</span>`;
    }

    function showLogin() {
      $("loginBox").classList.remove("hidden");
      $("registerBox").classList.add("hidden");
      $("btnTabLogin").classList.remove("ghost");
      $("btnTabRegister").classList.add("ghost");
    }

    function showRegister() {
      $("loginBox").classList.add("hidden");
      $("registerBox").classList.remove("hidden");
      $("btnTabLogin").classList.add("ghost");
      $("btnTabRegister").classList.remove("ghost");
    }

    $("btnTabLogin").onclick = showLogin;
    $("btnTabRegister").onclick = showRegister;

    $("memoriaRam").addEventListener("change", () => {
      $("ramOutroWrap").classList.toggle("hidden", $("memoriaRam").value !== "Outro");
      updateChecklist();
    });

    $("armazenamentoTipo").addEventListener("change", () => {
      $("outroStorageWrap").classList.toggle("hidden", $("armazenamentoTipo").value !== "SSD Outros");
      updateChecklist();
    });

    $("officeAtivado").addEventListener("change", updateChecklist);
    $("proxyInicializar").addEventListener("change", updateChecklist);
    $("localidade").addEventListener("change", () => {
      const loc = $("localidade").value;
      $("proxyWrap").classList.toggle("hidden", loc === "PAMB" || !loc);
      $("setorPAWrap").classList.toggle("hidden", loc !== "PA");

      if (loc === "PAMB" || !loc) {
        $("proxyInicializar").value = "";
      }

      if (loc !== "PA") {
        $("setorPA").value = "";
        $("financeiroSoftwaresWrap").classList.add("hidden");
        document.querySelectorAll(".financeiroSoftware").forEach(cb => cb.checked = false);
      }

      updateChecklist();
    });

    $("setorPA").addEventListener("change", () => {
      const setor = $("setorPA").value;
      $("financeiroSoftwaresWrap").classList.toggle("hidden", setor !== "Financeiro");

      if (setor !== "Financeiro") {
        document.querySelectorAll(".financeiroSoftware").forEach(cb => cb.checked = false);
      }

      updateChecklist();
    });

    document.querySelectorAll(".financeiroSoftware").forEach(cb => {
      cb.addEventListener("change", updateChecklist);
    });

    function getSupabase() {
      if (!window.SUPABASE_URL || !window.SUPABASE_ANON_KEY || window.SUPABASE_URL.includes("COLE_AQUI")) {
        throw new Error("Preencha o arquivo supabase-config.js com a URL e a ANON KEY do Supabase.");
      }

      if (!window.supabase || !window.supabase.createClient) {
        throw new Error("A biblioteca do Supabase não carregou corretamente.");
      }

      if (!APP.supabase) {
        APP.supabase = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
      }

      return APP.supabase;
    }

    function updateChecklist() {
      const localidade = $("localidade").value;
      const office = $("officeAtivado").value;
      const proxy = $("proxyInicializar").value;
      const setor = $("setorPA").value;
      const softwares = Array.from(document.querySelectorAll(".financeiroSoftware:checked")).length;

      const items = [];

      items.push({
        label: "Office ativado",
        ok: office === "Sim",
        text: office ? office : "Pendente"
      });

      if (localidade && localidade !== "PAMB") {
        items.push({
          label: "Proxy removido do Inicializar",
          ok: proxy === "Sim",
          text: proxy ? proxy : "Pendente"
        });
      }

      if (localidade === "PA") {
        items.push({
          label: "Setor do PA",
          ok: !!setor,
          text: setor || "Pendente"
        });

        if (setor === "Financeiro") {
          items.push({
            label: "Softwares do Financeiro",
            ok: softwares >= 2,
            text: `${softwares} marcado(s)`
          });
        }
      }

      const html = items.length
        ? items.map(item => `
          <div class="check-item">
            <span>${item.label}</span>
            ${item.ok ? badge(item.text, "success") : badge(item.text, "warning")}
          </div>
        `).join("")
        : `<div class="empty">O checklist aparecerá conforme você preencher o chamado.</div>`;

      $("checklistBox").innerHTML = html;
    }

    async function register() {
      try {
        const nome = $("regNome").value.trim();
        const email = $("regEmail").value.trim();
        const senha = $("regSenha").value;
        const senha2 = $("regSenha2").value;

        if (!nome || !email || !senha || !senha2) {
          return setMsg(authMsg, "Preencha todos os campos.", "err");
        }

        if (senha !== senha2) {
          return setMsg(authMsg, "As senhas não coincidem.", "err");
        }

        const supabase = getSupabase();
        const { data, error } = await supabase.auth.signUp({ email, password: senha });
        if (error) throw error;

        if (data.user) {
          const { error: profileError } = await supabase.from("tecnicos").upsert({
            id: data.user.id,
            nome,
            email
          });
          if (profileError) throw profileError;
        }

        setMsg(authMsg, "Conta criada. Faça login para entrar.", "ok");
        showToast("Conta criada com sucesso.", "success");
        $("loginEmail").value = email;
        showLogin();
      } catch (e) {
        console.error("Erro no registro:", e);
        setMsg(authMsg, e.message || "Erro ao registrar.", "err");
        showToast(e.message || "Erro ao registrar.", "error");
      }
    }

    async function login() {
      try {
        const email = $("loginEmail").value.trim();
        const senha = $("loginSenha").value;
        const supabase = getSupabase();

        const { data, error } = await supabase.auth.signInWithPassword({ email, password: senha });
        if (error) throw error;

        APP.sessionUser = data.user;
        await loadProfile();
        enterApp();
        showToast("Login realizado com sucesso.", "success");

        console.error("Erro no login:", e);
        setMsg(authMsg, e.message || "Erro ao entrar.", "err");
        showToast(e.message || "Erro ao entrar.", "error");

      const supabase = getSupabase();

        .eq("id", APP.sessionUser.id)

    async function loadDashboard(month) {
      try {
        const supabase = getSupabase();

        let query = supabase.from("chamados").select("*").order("created_at", { ascending: false });

        if (month && /^\d{4}-\d{2}$/.test(month)) {
          const startDate = new Date(month + "-01T00:00:00");
          const endDate = new Date(startDate.getFullYear(), startDate.getMonth() + 1, 1);
          query = query.gte("created_at", startDate.toISOString()).lt("created_at", endDate.toISOString());
        }

        const { data, error } = await query;
        if (error) throw error;

        APP.allCallsForDashboard = data || [];
        renderDashboard(APP.allCallsForDashboard, month);
      } catch (e) {
        console.error("Erro ao carregar dashboard:", e);
        showToast("Erro ao carregar dashboard.", "error");
      }
    }

    function renderDashboard(items, month) {
      const total = items.length;
      const clones = items.filter(i => i.tipo_instalacao === "Clone").length;
      const limpas = items.filter(i => i.tipo_instalacao === "Instalação limpa").length;
      const pams = items.filter(i => i.localidade === "PAMB").length;

      $("dashboardCards").innerHTML = `
        <div class="metric">
          <div class="label">Chamados no período</div>
          <div class="value">${total}</div>
          <div class="sub">${month || "Todos os meses"}</div>
        </div>
        <div class="metric">
          <div class="label">Instalação limpa</div>
          <div class="value">${limpas}</div>
          <div class="sub">Total de instalações limpas</div>
        </div>
        <div class="metric">
          <div class="label">Clone</div>
          <div class="value">${clones}</div>
          <div class="sub">Total de clonagens</div>
        </div>
        <div class="metric">
          <div class="label">Localidade PAMB</div>
          <div class="value">${pams}</div>
          <div class="sub">Chamados no PAMB</div>
        </div>
      `;

      const patrimonioMap = {};
      items.forEach(item => {
        const key = item.patrimonio || "Sem patrimônio";
        if (!patrimonioMap[key]) {
          patrimonioMap[key] = { patrimonio: key, localidade: item.localidade || "-", total: 0 };
        }
        patrimonioMap[key].total += 1;
      });

      const topPatrimonios = Object.values(patrimonioMap)
        .sort((a, b) => b.total - a.total)
        .slice(0, 10);

      $("dashboardPatrimonio").innerHTML = topPatrimonios.length
        ? `<table>
            <tr><th>Patrimônio</th><th>Localidade</th><th>Qtd.</th></tr>
            ${topPatrimonios.map(i => `
              <tr>
                <td>${i.patrimonio}</td>
                <td>${i.localidade}</td>
                <td>${i.total}</td>
              </tr>
            `).join("")}
          </table>`
        : `<div class="empty">Sem dados para o período.</div>`;

      const localidadeMap = {};
      items.forEach(item => {
        const key = item.localidade || "Sem localidade";
        if (!localidadeMap[key]) localidadeMap[key] = 0;
        localidadeMap[key] += 1;
      });

      const topLocalidades = Object.entries(localidadeMap)
        .map(([localidade, total]) => ({ localidade, total }))
        .sort((a, b) => b.total - a.total);

      $("dashboardLocalidade").innerHTML = topLocalidades.length
        ? `<table>
            <tr><th>Localidade</th><th>Qtd.</th></tr>
            ${topLocalidades.map(i => `
              <tr>
                <td>${i.localidade}</td>
                <td>${i.total}</td>
              </tr>
            `).join("")}
          </table>`
        : `<div class="empty">Sem dados para o período.</div>`;
    }

    function collectForm() {
      const memoriaBase = $("memoriaRam").value;
      const memoriaFinal = memoriaBase === "Outro" ? $("memoriaRamOutro").value.trim() : memoriaBase;

      const softwaresFinanceiro = Array.from(
        document.querySelectorAll(".financeiroSoftware:checked")
      ).map(cb => cb.value);

      return {
        numero_chamado: $("numeroChamado").value.trim(),
        patrimonio: $("patrimonio").value.trim().toUpperCase(),
        marca_computador: $("marcaComputador").value,
        tipo_instalacao: $("tipoInstalacao").value,
        office_ativado: $("officeAtivado").value,
        ip: $("ip").value.trim(),
        localidade: $("localidade").value,
        proxy_inicializar: $("localidade").value && $("localidade").value !== "PAMB"
          ? $("proxyInicializar").value
          : "",
        setor_pa: $("localidade").value === "PA" ? $("setorPA").value : "",
        softwares_financeiro: $("localidade").value === "PA" && $("setorPA").value === "Financeiro"
          ? softwaresFinanceiro.join(", ")
          : "",
        memoria_ram: memoriaFinal,
        armazenamento_tipo: $("armazenamentoTipo").value,

          : "",

        tecnico_id: APP.profile.id,
        tecnico_nome: APP.profile.nome
      };

    function validatePayload(p) {
      if (
        !p.numero_chamado ||
        !p.patrimonio ||
        !p.marca_computador ||
        !p.tipo_instalacao ||
        !p.office_ativado ||
        !p.ip ||
        !p.localidade ||
        !p.memoria_ram ||
        !p.armazenamento_tipo ||
        !p.problema ||
        !p.resolucao
      ) {
        throw new Error("Preencha todos os campos obrigatórios.");
      }

      if (p.armazenamento_tipo === "SSD Outros" && !p.armazenamento_outros) {
        throw new Error("Informe a marca/modelo do SSD.");
      }

      if (p.office_ativado !== "Sim") {
        throw new Error("É necessário Office ativado para prosseguir.");
      }

      if (p.localidade !== "PAMB" && p.proxy_inicializar !== "Sim") {
        throw new Error("É necessário retirar o proxy em máquinas do PA para prosseguir.");
      }

      if (p.localidade === "PA" && !p.setor_pa) {
        throw new Error("Selecione o setor do PA.");
      }

      if (p.localidade === "PA" && p.setor_pa === "Financeiro") {
        const qtd = p.softwares_financeiro
          ? p.softwares_financeiro.split(",").map(s => s.trim()).filter(Boolean).length
          : 0;

        if (qtd < 2) {
          throw new Error("No setor Financeiro é necessário marcar no mínimo 2 softwares.");
        }
      }
    }

    async function saveCall() {
      try {
        const supabase = getSupabase();
        const payload = collectForm();
        validatePayload(payload);

        if (APP.editingId) {
          const { data: prev, error: prevError } = await supabase
            .from("chamados")
            .select("*")
            .eq("id", APP.editingId)
            .single();

          if (prevError) throw prevError;

          const { error } = await supabase
            .from("chamados")
            .update(payload)
            .eq("id", APP.editingId);

          if (error) throw error;

          const labels = {
            numero_chamado: "Número do chamado",
            patrimonio: "Patrimônio",
            marca_computador: "Marca do computador",
            tipo_instalacao: "Tipo de instalação",
            office_ativado: "Office ativado",
            ip: "IP",
            localidade: "Localidade",
            proxy_inicializar: "Proxy Inicializar",
            setor_pa: "Setor PA",
            softwares_financeiro: "Softwares Financeiro",
            memoria_ram: "Memória RAM",
            armazenamento_tipo: "Armazenamento",
            armazenamento_outros: "Detalhe armazenamento",
            problema: "Problema",
            resolucao: "Resolução"
          };

          const changed = [];
          Object.keys(labels).forEach(k => {
            if ((prev[k] || "") !== (payload[k] || "")) changed.push(labels[k]);
          });

          const { error: auditError } = await supabase.from("historico_alteracoes").insert({
            chamado_id: APP.editingId,
            patrimonio: payload.patrimonio,
            tecnico_id: APP.profile.id,
            tecnico_nome: APP.profile.nome,
            acao: "UPDATE",
            resumo: changed.length ? `Alterado: ${changed.join(", ")}` : "Alteração sem mudança detectada"
          });

          if (auditError) throw auditError;
          setMsg(formMsg, "Chamado atualizado com sucesso.", "ok");
          showToast("Chamado atualizado com sucesso.", "success");
        } else {
          const { data, error } = await supabase
            .from("chamados")
            .insert(payload)
            .select()
            .single();

          if (error) throw error;

          const { error: auditError } = await supabase.from("historico_alteracoes").insert({
            chamado_id: data.id,
            patrimonio: payload.patrimonio,
            tecnico_id: APP.profile.id,
            tecnico_nome: APP.profile.nome,
            acao: "CREATE",
            resumo: `Chamado ${payload.numero_chamado} criado`
          });

          if (auditError) throw auditError;
          setMsg(formMsg, "Chamado salvo com sucesso.", "ok");
          showToast("Chamado salvo com sucesso.", "success");
        }

        resetForm();
        await buscar();
        await loadDashboard($("dashboardMonth").value.trim());
      } catch (e) {
        console.error("Erro ao salvar chamado:", e);
        setMsg(formMsg, e.message || "Erro ao salvar.", "err");
        showToast(e.message || "Erro ao salvar.", "error");
      }
    }

    function buildFiltersQuery(query) {
      const patrimonio = $("buscaPatrimonio").value.trim().toUpperCase();
      const localidade = $("filtroLocalidade").value;
      const tecnico = $("filtroTecnico").value.trim();
      const marca = $("filtroMarca").value;
      const instalacao = $("filtroInstalacao").value;
      const mes = $("filtroMes").value.trim();

      if (patrimonio) query = query.ilike("patrimonio", `%${patrimonio}%`);
      if (localidade) query = query.eq("localidade", localidade);
      if (tecnico) query = query.ilike("tecnico_nome", `%${tecnico}%`);
      if (marca) query = query.eq("marca_computador", marca);
      if (instalacao) query = query.eq("tipo_instalacao", instalacao);

      if (mes && /^\d{4}-\d{2}$/.test(mes)) {
        const startDate = new Date(mes + "-01T00:00:00");
        const endDate = new Date(startDate.getFullYear(), startDate.getMonth() + 1, 1);
        query = query.gte("created_at", startDate.toISOString()).lt("created_at", endDate.toISOString());
      }

      return query;
    }

    async function buscar() {
      try {
        const supabase = getSupabase();

        let chamadosQuery = supabase.from("chamados").select("*").order("created_at", { ascending: false });
        chamadosQuery = buildFiltersQuery(chamadosQuery);

        const { data: chamados, error } = await chamadosQuery;
        if (error) throw error;

        let historicoQuery = supabase.from("historico_alteracoes").select("*").order("created_at", { ascending: false });
        const patrimonio = $("buscaPatrimonio").value.trim().toUpperCase();
        if (patrimonio) historicoQuery = historicoQuery.ilike("patrimonio", `%${patrimonio}%`);

        const { data: historico, error: histError } = await historicoQuery;
        if (histError) throw histError;

        APP.currentFilteredCalls = chamados || [];
        renderChamados(APP.currentFilteredCalls);
        renderCards(APP.currentFilteredCalls);
        renderHistorico(historico || []);
      } catch (e) {
        console.error("Erro na busca:", e);
        $("resultadoChamados").innerHTML = `<p class="err small">${e.message || "Erro na busca."}</p>`;
        $("resultadoHistorico").innerHTML = "";
        $("resultadoCards").innerHTML = "";
        showToast("Erro na busca.", "error");
      }
    }

            <p><strong>Armazenamento:</strong> ${storage}</p>
          </div>

          <div class="card" style="margin-bottom:0;">
            <h4>Datas</h4>
            <p><strong>Criado em:</strong> ${item.created_at ? new Date(item.created_at).toLocaleString("pt-BR") : "-"}</p>
            <p><strong>Atualizado em:</strong> ${item.updated_at ? new Date(item.updated_at).toLocaleString("pt-BR") : "-"}</p>
          </div>

          <div class="card" style="grid-column:1/-1; margin-bottom:0;">
            <h4>Problema</h4>
            <p>${(item.problema || "-").replace(/\n/g, "<br>")}</p>
          </div>

          <div class="card" style="grid-column:1/-1; margin-bottom:0;">
            <h4>Resolução</h4>
            <p>${(item.resolucao || "-").replace(/\n/g, "<br>")}</p>
          </div>
        </div>
      `;

      $("detailsModalBackdrop").classList.remove("hidden");
    };

    $("btnCloseDetails").onclick = () => {
      $("detailsModalBackdrop").classList.add("hidden");
    };

    $("detailsModalBackdrop").addEventListener("click", (e) => {
      if (e.target.id === "detailsModalBackdrop") {
        $("detailsModalBackdrop").classList.add("hidden");
      }
    });

    window.editarChamado = function(id) {
      const item = APP.lastCalls.find(x => x.id === id);
      if (!item) return;

      APP.editingId = id;
      $("formTitle").textContent = "Editar chamado";
      $("numeroChamado").value = item.numero_chamado || "";
      $("patrimonio").value = item.patrimonio || "";
      $("marcaComputador").value = item.marca_computador || "";
      $("tipoInstalacao").value = item.tipo_instalacao || "";
      $("officeAtivado").value = item.office_ativado || "";
      $("ip").value = item.ip || "";
      $("localidade").value = item.localidade || "";
      $("proxyInicializar").value = item.proxy_inicializar || "";
      $("setorPA").value = item.setor_pa || "";

      $("proxyWrap").classList.toggle("hidden", !item.localidade || item.localidade === "PAMB");
      $("setorPAWrap").classList.toggle("hidden", item.localidade !== "PA");
      $("financeiroSoftwaresWrap").classList.toggle("hidden", item.setor_pa !== "Financeiro");

      document.querySelectorAll(".financeiroSoftware").forEach(cb => {
        cb.checked = (item.softwares_financeiro || "").split(",").map(s => s.trim()).includes(cb.value);
      });

      if (RAM_OPTIONS.includes(item.memoria_ram)) {
        $("memoriaRam").value = item.memoria_ram;
        $("memoriaRamOutro").value = "";
        $("ramOutroWrap").classList.toggle("hidden", item.memoria_ram !== "Outro");
      } else {
        $("memoriaRam").value = "Outro";
        $("memoriaRamOutro").value = item.memoria_ram || "";
        $("ramOutroWrap").classList.remove("hidden");
      }

      $("armazenamentoTipo").value = item.armazenamento_tipo || "";
      $("armazenamentoOutros").value = item.armazenamento_outros || "";
      $("outroStorageWrap").classList.toggle("hidden", item.armazenamento_tipo !== "SSD Outros");
      $("problema").value = item.problema || "";
      $("resolucao").value = item.resolucao || "";
      $("btnCancelarEdicao").classList.remove("hidden");
      updateChecklist();
      window.scrollTo({ top: 0, behavior: "smooth" });
    };

    $("btnCancelarEdicao").onclick = resetForm;

    async function exportarCSV() {
      try {
        const month = $("mesRef").value.trim();
        if (!month || !/^\d{4}-\d{2}$/.test(month)) {
          throw new Error("Digite o mês no formato AAAA-MM. Ex.: 2026-03");
        }

        const startDate = new Date(month + "-01T00:00:00");
        const endDate = new Date(startDate.getFullYear(), startDate.getMonth() + 1, 1);

        const supabase = getSupabase();
        const { data, error } = await supabase
          .from("chamados")
          .select("*")
          .gte("created_at", startDate.toISOString())
          .lt("created_at", endDate.toISOString())
          .order("created_at", { ascending: true });

        if (error) throw error;

        const rows = [[
          "Data",
          "Número do chamado",
          "Patrimônio",
          "Marca",
          "Tipo de instalação",
          "Office ativado",
          "Proxy removido do Inicializar",
          "Setor PA",
          "Softwares Financeiro",
          "IP",
          "Localidade",
          "Técnico",
          "Memória RAM",
          "Armazenamento",
          "Problema",
          "Resolução"
        ]];

        (data || []).forEach(item => {
          const storage = item.armazenamento_tipo === "SSD Outros" && item.armazenamento_outros
            ? `${item.armazenamento_tipo} (${item.armazenamento_outros})`
            : item.armazenamento_tipo;

          rows.push([
            new Date(item.created_at).toLocaleString("pt-BR"),
            item.numero_chamado,
            item.patrimonio,
            item.marca_computador || "",
            item.tipo_instalacao || "",
            item.office_ativado || "",
            item.proxy_inicializar || "",
            item.setor_pa || "",
            item.softwares_financeiro || "",
            item.ip || "",
            item.localidade || "",
            item.tecnico_nome || "",
            item.memoria_ram,
            storage,
            (item.problema || "").replace(/\n/g, " "),
            (item.resolucao || "").replace(/\n/g, " ")
          ]);
        });

        const csv = rows.map(r => r.map(v => `"${String(v ?? "").replace(/"/g, '""')}"`).join(",")).join("\n");
        const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8;" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `relatorio_chamados_${month}.csv`;
        a.click();
        showToast("Relatório exportado com sucesso.", "success");
      } catch (e) {
        console.error("Erro ao exportar CSV:", e);
        alert(e.message || "Erro ao exportar.");
      }
    }

    async function logout() {
      try {
        const supabase = getSupabase();
        await supabase.auth.signOut();
      } catch (e) {
        console.error("Erro ao sair:", e);
      }
      location.reload();
    }

    $("btnRegister").onclick = register;
    $("btnLogin").onclick = login;
    $("btnSalvar").onclick = saveCall;
    $("btnBuscar").onclick = buscar;
    $("btnExportar").onclick = exportarCSV;
    $("btnLogout").onclick = logout;
    $("btnRefreshDashboard").onclick = () => loadDashboard($("dashboardMonth").value.trim());

    $("btnLimparFiltros").onclick = () => {
      $("buscaPatrimonio").value = "";
      $("filtroLocalidade").value = "";
      $("filtroTecnico").value = "";
      $("filtroMarca").value = "";
      $("filtroInstalacao").value = "";
      $("filtroMes").value = "";
      buscar();
    };

    updateChecklist();
    restoreSession();
  </script>
</body>
</html>
